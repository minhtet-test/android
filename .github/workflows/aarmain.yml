name: Build AmneziaWG AAR

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      # Gradle Version ကို 8.4 သို့ လျှော့ချပြီး Build လုပ်ခြင်း
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Project ထဲမှာ ရှိတဲ့ Module နာမည်များကို စစ်ဆေးပြီး Build လုပ်ခြင်း
      - name: Build Tunnel AAR
        run: |
          if [ -d "tunnel" ]; then
            ./gradlew :tunnel:assembleRelease
          elif [ -d "library" ]; then
            ./gradlew :library:assembleRelease
          else
            ./gradlew assembleRelease
          fi

      - name: Upload AAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: amnezia-i1-library
          path: "**/*.aar"
