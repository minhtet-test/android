name: Build AmneziaWG I1 Library

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # APK build လုပ်တာကို ကျော်ပြီး Library (.aar) ကိုပဲ အဓိကထားထုတ်ခြင်း
      - name: Build Library Only
        run: |
          ./gradlew :tunnel:assembleRelease || ./gradlew :library:assembleRelease || ./gradlew :amneziawg:assembleRelease || ./gradlew assemble

      - name: Upload Library Result
        uses: actions/upload-artifact@v4
        with:
          name: amnezia-i1-aar
          path: "**/*.aar"
