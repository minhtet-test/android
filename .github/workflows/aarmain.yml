name: Build AmneziaWG I1 Library

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Grant execute permission
        run: chmod +x gradlew

      # မလိုအပ်ဘဲ အချိန်ကြာစေမည့် Lint နှင့် အခြား Tasks များကို ပိတ်ပြီး Library ကိုသာ Build လုပ်ခြင်း
      - name: Fast Build Library Only
        run: |
          ./gradlew :tunnel:assembleRelease \
            -x lint \
            -x lintVitalRelease \
            -x test \
            --stacktrace
            
      - name: Upload Library Result
        uses: actions/upload-artifact@v4
        with:
          name: amnezia-i1-aar
          path: "**/tunnel-release.aar"
