- name: Build Tunnel AAR
        run: |
          # APK build လုပ်ခြင်းကို ကျော်ပြီး library (.aar) ကိုပဲ သီးသန့်ထုတ်ယူခြင်း
          if [ -d "tunnel" ]; then
            ./gradlew :tunnel:assembleRelease
          elif [ -d "library" ]; then
            ./gradlew :library:assembleRelease
          elif [ -d "amneziawg" ]; then
            ./gradlew :amneziawg:assembleRelease
          else
            # Module name အတိအကျ မသိပါက project ထဲက library အားလုံးကို build လုပ်ခိုင်းခြင်း
            ./gradlew assemble
          fi

      - name: Upload AAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: amnezia-i1-library
          path: "**/*.aar" # Folder အားလုံးထဲက ထွက်လာသမျှ .aar အားလုံးကို ရှာပြီး တင်ပေးမည်
